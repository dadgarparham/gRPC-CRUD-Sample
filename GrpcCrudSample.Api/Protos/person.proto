syntax = "proto3";

option csharp_namespace = "GrpcCrudSample.Api";

package person;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service PersonService {
  rpc GetAll (google.protobuf.Empty) returns (PersonListResponse);
  rpc GetById (GetPersonByIdRequest) returns (PersonResponse);
  rpc Create (CreatePersonRequest) returns (PersonResponse);
  rpc Update (UpdatePersonRequest) returns (PersonResponse);
  rpc Delete (DeletePersonRequest) returns (DeletePersonResponse);
}

message GetPersonByIdRequest {
  int32 id = 1;
}

message CreatePersonRequest {
  string name = 1;
  string lastName = 2;
  string personalCode = 3;
  google.protobuf.Timestamp birthDay = 4;
}

message UpdatePersonRequest {
  int32 id = 1;
  string name = 2;
  string lastName = 3;
  string personalCode = 4;
  google.protobuf.Timestamp birthDay = 5;
}

message DeletePersonRequest {
  int32 id = 1;
}

message DeletePersonResponse {
  bool success = 1;
  string message = 2;
}

message PersonResponse {
  int32 id = 1;
  string name = 2;
  string lastName = 3;
  string personalCode = 4;
  google.protobuf.Timestamp birthDay = 5;
}

message PersonListResponse {
  repeated PersonResponse persons = 1;
}
